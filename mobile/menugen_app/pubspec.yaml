name: menugen_app
description: Р В Р’В Р РҶР вҖҡРЎСҷР В Р’В Р вҖҷР’ВөР В Р’В Р В РІРӮВҰР В Р’В Р вҖҷР’ВөР В Р РӢР В РІРӮСҷР В Р’В Р вҖҷР’В°Р В Р РӢР РҶР вҖҡРЎв„ўР В Р’В Р РҺРІРӮСһР В Р РӢР В РІРӮСҷ Р В Р’В Р РҺР’ВҳР В Р’В Р вҖҷР’ВөР В Р’В Р В РІРӮВҰР В Р РӢР В РІРӮв„– Р В Р вҖ Р В РІРӮСҷР РҶР вҖҡРЎСҡ Р В Р’В Р РҺРІРӮвҖқР В Р’В Р вҖҷР’ВөР В Р РӢР В РІРӮСҷР В Р РӢР В РЎвҖңР В Р’В Р РҺРІРӮСһР В Р’В Р В РІРӮВҰР В Р’В Р вҖҷР’В°Р В Р’В Р вҖҷР’В»Р В Р’В Р РҺРІРӮВҳР В Р’В Р вҖҷР’В·Р В Р’В Р РҺРІРӮВҳР В Р РӢР В РІРӮСҷР В Р’В Р РҺРІРӮСһР В Р’В Р В РІРӮВ Р В Р’В Р вҖҷР’В°Р В Р’В Р В РІРӮВҰР В Р’В Р В РІРӮВҰР В Р’В Р РҺРІРӮСһР В Р’В Р вҖҷР’Вө Р В Р’В Р РҺРІРӮвҖқР В Р’В Р вҖҷР’В»Р В Р’В Р вҖҷР’В°Р В Р’В Р В РІРӮВҰР В Р’В Р РҺРІРӮВҳР В Р РӢР В РІРӮСҷР В Р’В Р РҺРІРӮСһР В Р’В Р В РІРӮВ Р В Р’В Р вҖҷР’В°Р В Р’В Р В РІРӮВҰР В Р’В Р РҺРІРӮВҳР В Р’В Р вҖҷР’Вө Р В Р’В Р РҺРІРӮвҖқР В Р’В Р РҺРІРӮВҳР В Р РӢР РҶР вҖҡРЎв„ўР В Р’В Р вҖҷР’В°Р В Р’В Р В РІРӮВҰР В Р’В Р РҺРІРӮВҳР В Р РӢР В Р РҸ

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Network
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Local DB (Offline-First)
  drift: ^2.18.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # Auth & Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^13.2.1

  # Connectivity
  connectivity_plus: ^6.0.3

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  table_calendar: ^3.1.1

  # Utils
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.10
  drift_dev: ^2.18.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
