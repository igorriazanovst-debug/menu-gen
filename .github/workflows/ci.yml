name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8 black isort
        working-directory: backend

      - name: Run flake8
        run: flake8 . --max-line-length=120 --exclude=migrations
        working-directory: backend

      - name: Run black check
        run: black --check . --exclude=migrations
        working-directory: backend

      - name: Run isort check
        run: isort --check-only . --skip=migrations
        working-directory: backend

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: menugen_test
          POSTGRES_USER: menugen_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-secret-key-not-for-production' }}
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DB_NAME: menugen_test
      DB_USER: menugen_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: "15"
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: "30"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run migrations
        run: python manage.py migrate
        working-directory: backend

      - name: Run tests with coverage
        run: |
          coverage run -m pytest
          coverage report --fail-under=70
        working-directory: backend
